<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baharat Saga FINAL STABLE</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
overflow:hidden;
background:#070b18;
font-family:sans-serif;
color:#fff;
}

#hud{
position:fixed;
top:0;left:0;right:0;
height:52px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
background:#0009;
z-index:10;
}

#wrap{
position:absolute;
top:52px;bottom:0;left:0;right:0;
display:flex;
justify-content:center;
align-items:center;
}

.board{
width:min(100vw,100vh-52px);
height:min(100vw,100vh-52px);
display:grid;
grid-template-columns:repeat(6,1fr);
gap:5px;
padding:6px;
}

.tile{
background:#1e293b;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.tile img{
width:100%;
height:100%;
object-fit:cover;
}

.flash{
position:fixed;inset:0;
background:#fff;
opacity:0;
pointer-events:none;
}

.flash.active{animation:flash .15s}

@keyframes flash{0%{opacity:.6}100%{opacity:0}}

.particle{
position:fixed;
width:5px;height:5px;
background:#fff;
border-radius:50%;
pointer-events:none;
animation:p .35s forwards;
}

@keyframes p{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}
</style>
</head>

<body>

<div id="hud">
<div>🌶 Gram: <span id="score">0</span></div>
<div>♾ Stable</div>
</div>

<div id="wrap">
<div id="board" class="board"></div>
</div>

<script>

const TYPES=["zerdecal","safran","pulbiber","karabiber","kekik","tarcin","sumak","anason"];

let board=[];
let size=6;
let busy=false;
let score=0;
let start=null;

function rand(){
return TYPES[Math.floor(Math.random()*TYPES.length)];
}

function img(t){
return "img/"+t+".png";
}

/* ================= INIT ================= */

function init(){
const el=document.getElementById("board");
el.innerHTML="";
board=[];

for(let i=0;i<size*size;i++){

let d=document.createElement("div");
d.className="tile";

board.push({type:rand(),el:d});

d.addEventListener("touchstart",e=>{
if(busy)return;
start={i, x:e.touches[0].clientX, y:e.touches[0].clientY};
});

d.addEventListener("touchend",e=>{
if(!start||busy)return;

let dx=e.changedTouches[0].clientX-start.x;
let dy=e.changedTouches[0].clientY-start.y;

let t=null;

if(Math.abs(dx)>Math.abs(dy)){
if(dx>25)t=start.i+1;
else if(dx<-25)t=start.i-1;
}else{
if(dy>25)t=start.i+size;
else if(dy<-25)t=start.i-size;
}

if(valid(start.i,t)){
swap(start.i,t);
if(find().length){
busy=true;
resolveLoop();
}else{
swap(start.i,t);
draw();
}
}

start=null;
});

el.appendChild(d);
}

draw();
clean();
ensurePlayable();
}

/* ================= DRAW ================= */

function draw(){
board.forEach(t=>{
t.el.innerHTML=`<img src="${img(t.type)}" onerror="this.src='img/zerdecal.png'">`;
});
}

/* ================= VALID ================= */

function valid(a,b){
if(b<0||b>=36)return false;
let ar=Math.floor(a/6);
let br=Math.floor(b/6);
return !(Math.abs(a-b)==1 && ar!==br);
}

/* ================= SWAP ================= */

function swap(a,b){
[board[a],board[b]]=[board[b],board[a]];
}

/* ================= CORE FIXED ENGINE ================= */

function resolveLoop(){

while(true){

let m=find();

if(!m.length){
busy=false;
ensurePlayable();
return;
}

/* CLEAR */
m.forEach(i=>{
board[i].type=null;
score++;
});

/* GRAVITY */
gravity();

/* REFILL */
fill();

/* DRAW */
draw();

}

}

/* ================= MATCH FIND ================= */

function find(){
let res=[];

/* horizontal */
for(let r=0;r<6;r++){
for(let c=0;c<4;c++){
let i=r*6+c;
let t=board[i].type;
if(t && t===board[i+1].type && t===board[i+2].type){
res.push(i,i+1,i+2);
}
}
}

/* vertical */
for(let c=0;c<6;c++){
for(let r=0;r<4;r++){
let i=r*6+c;
let t=board[i].type;
if(t && t===board[i+6].type && t===board[i+12].type){
res.push(i,i+6,i+12);
}
}
}

return [...new Set(res)];
}

/* ================= GRAVITY ================= */

function gravity(){
for(let c=0;c<6;c++){

let col=[];

for(let r=5;r>=0;r--){
let i=r*6+c;
if(board[i].type)col.push(board[i].type);
}

for(let r=5;r>=0;r--){
let i=r*6+c;
board[i].type=col.shift()||null;
}

}
}

/* ================= FILL ================= */

function fill(){
for(let i=0;i<board.length;i++){
if(!board[i].type){
board[i].type=rand();
}
}
}

/* ================= CLEAN START ================= */

function clean(){
let m=find();
while(m.length){
m.forEach(i=>board[i].type=rand());
m=find();
}
draw();
}

/* ================= PLAYABLE CHECK ================= */

function ensurePlayable(){

if(hasMove())return;

for(let i=0;i<10;i++){
shuffle();
if(hasMove())return;
}

resetBoard();
}

function hasMove(){

for(let i=0;i<board.length;i++){
for(let d of [1,6]){
let j=i+d;
if(!valid(i,j))continue;

swap(i,j);
let ok=find().length>0;
swap(i,j);

if(ok)return true;
}
}

return false;
}

/* ================= SHUFFLE ================= */

function shuffle(){
for(let i=board.length-1;i>0;i--){
let j=Math.floor(Math.random()*i);
[board[i].type,board[j].type]=[board[j].type,board[i].type];
}
}

/* ================= RESET ================= */

function resetBoard(){
for(let i=0;i<board.length;i++){
board[i].type=rand();
}
draw();
}

/* ================= START ================= */

init();

</script>

</body>
</html>
