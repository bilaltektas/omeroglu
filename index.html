<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Baharat Patlat ULTRA</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
background:#0a0f1c;
font-family:system-ui;
overflow:hidden;
color:#fff;
}

/* ===== HUD ===== */
#hud{
position:fixed;
top:0;left:0;right:0;
height:56px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 14px;
background:rgba(10,15,28,.85);
backdrop-filter:blur(10px);
z-index:10;
font-weight:600;
}

/* ===== GAME WRAP ===== */
#wrap{
position:absolute;
top:56px;
left:0;
right:0;
bottom:0;
display:flex;
align-items:center;
justify-content:center;
}

/* ===== BOARD ===== */
.board{
width:100vmin;
height:100vmin;
max-width:100vw;
max-height:calc(100vh - 56px);
display:grid;
grid-template-columns:repeat(8,1fr);
gap:3px;
padding:6px;
}

.tile{
background:#162033;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
touch-action:none;
}

.tile img{
width:92%;
user-select:none;
pointer-events:none;
}

/* ===== FX ===== */
.pop{animation:pop .2s}
@keyframes pop{
0%{transform:scale(1)}
50%{transform:scale(1.25)}
100%{transform:scale(1)}
}

.shake{animation:shake .25s}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
75%{transform:translateX(-2px)}
100%{transform:translateX(0)}
}

.flash{
position:fixed;
inset:0;
background:white;
opacity:0;
pointer-events:none;
}
.flash.active{animation:f .2s}
@keyframes f{0%{opacity:.8}100%{opacity:0}}

</style>
</head>

<body>

<div id="hud">
<div>⭐ Skor: <span id="score">0</span></div>
<div>🎮 Durum: <span id="state">READY</span></div>
</div>

<div id="wrap">
<div id="board" class="board"></div>
</div>

<div id="flash"></div>

<script>

const types=[
"zerdecal","safran","pulbiber","karabiber",
"kekik","tarcin","sumak","anason"
];

let board=[];
let lock=false;
let score=0;

let startX=0,startY=0,from=null;

const scoreEl=document.getElementById("score");
const stateEl=document.getElementById("state");

/* ================= INIT SAFE BOARD ================= */
function rand(){
return types[Math.floor(Math.random()*types.length)];
}

function generateSafe(){
let arr;
do{
arr=[];
for(let i=0;i<64;i++) arr.push(rand());
}while(hasMatch(arr));
return arr;
}

function hasMatch(a){
for(let r=0;r<8;r++){
for(let c=0;c<6;c++){
let i=r*8+c;
let t=a[i];
if(t && t===a[i+1] && t===a[i+2]) return true;
}
}
for(let c=0;c<8;c++){
for(let r=0;r<6;r++){
let i=r*8+c;
let t=a[i];
if(t && t===a[i+8] && t===a[i+16]) return true;
}
}
return false;
}

/* ================= INIT ================= */
function init(){
const b=document.getElementById("board");
b.innerHTML="";
board=[];

let start=generateSafe();

for(let i=0;i<64;i++){
let d=document.createElement("div");
d.className="tile";

board.push({type:start[i],el:d});

d.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
from=i;
});

d.addEventListener("touchend",e=>{
if(lock) return;

let dx=e.changedTouches[0].clientX-startX;
let dy=e.changedTouches[0].clientY-startY;

let to=null;

if(Math.abs(dx)>Math.abs(dy)){
to = dx>0 ? from+1 : from-1;
}else{
to = dy>0 ? from+8 : from-8;
}

if(valid(from,to)){
attemptSwap(from,to);
}

});

b.appendChild(d);
}

draw();
}

/* ================= DRAW ================= */
function draw(){
board.forEach(t=>{
// 🔥 GARANTİ: asla undefined olmaz
if(!t.type) t.type=rand();
t.el.innerHTML=`<img src="img/${t.type}.png">`;
});
}

/* ================= VALID ================= */
function valid(a,b){
if(b<0||b>=64) return false;

let ar=Math.floor(a/8);
let br=Math.floor(b/8);

// row break fix
if(Math.abs(a-b)===1 && ar!==br) return false;

return true;
}

/* ================= SWAP CORE ================= */
function swap(a,b){
[board[a],board[b]]=[board[b],board[a]];
}

/* ================= ATTEMPT SWAP ================= */
function attemptSwap(a,b){
lock=true;

swap(a,b);
draw();

let m=findMatches();

if(m.length===0){
state("REVERT");

setTimeout(()=>{
swap(a,b);
draw();

shake(a);
shake(b);

lock=false;
state("READY");

},140);

return;
}

state("MATCH");

setTimeout(()=>resolve(m),100);
}

/* ================= MATCH ================= */
function findMatches(){
let res=[];

for(let r=0;r<8;r++){
for(let c=0;c<6;c++){
let i=r*8+c;
let t=board[i].type;
if(t && t===board[i+1].type && t===board[i+2].type){
res.push(i,i+1,i+2);
}
}
}

for(let c=0;c<8;c++){
for(let r=0;r<6;r++){
let i=r*8+c;
let t=board[i].type;
if(t && t===board[i+8].type && t===board[i+16].type){
res.push(i,i+8,i+16);
}
}
}

return [...new Set(res)];
}

/* ================= RESOLVE ENGINE ================= */
async function resolve(list){

while(list.length){

list.forEach(i=>{
board[i].type=null;
score+=10;
pop(board[i].el);
flash();
});

update();
draw();

await wait(90);

gravity();
fill();
draw();

await wait(90);

list=findMatches();
}

lock=false;
state("READY");
}

/* ================= GRAVITY ================= */
function gravity(){
for(let c=0;c<8;c++){
let col=[];

for(let r=7;r>=0;r--){
let i=r*8+c;
if(board[i].type) col.push(board[i].type);
}

for(let r=7;r>=0;r--){
let i=r*8+c;
board[i].type=col.shift()||null;
}
}
}

/* ================= FILL SAFE ================= */
function fill(){
for(let i=0;i<64;i++){
if(!board[i].type){
board[i].type=rand();
}
}
}

/* ================= FX ================= */
function pop(el){
el.classList.add("pop");
setTimeout(()=>el.classList.remove("pop"),200);
}

function shake(i){
board[i].el.classList.add("shake");
setTimeout(()=>board[i].el.classList.remove("shake"),250);
}

function flash(){
let f=document.getElementById("flash");
f.classList.add("active");
setTimeout(()=>f.classList.remove("active"),200);
}

/* ================= UI ================= */
function update(){
scoreEl.innerText=score;
}

function state(s){
stateEl.innerText=s;
}

function wait(ms){
return new Promise(r=>setTimeout(r,ms));
}

init();

</script>

</body>
</html>
