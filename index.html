<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STABLE MATCH-3 ULTIMATE FIX</title>

<style>
body{margin:0;background:#070b18;overflow:hidden;font-family:sans-serif;color:#fff}
#hud{position:fixed;top:0;left:0;right:0;height:50px;background:#0009;display:flex;justify-content:space-between;align-items:center;padding:0 10px;z-index:10}
#board{position:absolute;top:50px;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:5px}
.tile{background:#1e293b;border-radius:10px;display:flex;align-items:center;justify-content:center}
.tile img{width:100%;height:100%;object-fit:cover}
</style>
</head>

<body>

<div id="hud">
<div>🌶 Gram: <span id="score">0</span></div>
<div>STABLE ENGINE</div>
</div>

<div id="board"></div>

<script>

const N=6;
const TYPES=["a","b","c","d","e","f","g","h"];

let board=[];
let busy=false;
let score=0;
let start=null;

/* ================= SAFE TILE ================= */

function safeType(i){

let tries=0;

while(tries<10){
let t=TYPES[Math.floor(Math.random()*TYPES.length)];

let r=Math.floor(i/N);
let c=i%N;

/* horizontal check */
if(c>=2){
if(board[i-1]?.type===t && board[i-2]?.type===t){tries++;continue;}
}

/* vertical check */
if(r>=2){
if(board[i-N]?.type===t && board[i-2*N]?.type===t){tries++;continue;}
}

return t;
}

return TYPES[0];
}

/* ================= INIT (SOLVABLE BOARD) ================= */

function init(){
const el=document.getElementById("board");
el.innerHTML="";
board=[];

for(let i=0;i<N*N;i++){
let d=document.createElement("div");
d.className="tile";

board.push({type:safeType(i),el:d});

d.addEventListener("touchstart",e=>{
if(busy)return;
start={i, x:e.touches[0].clientX, y:e.touches[0].clientY};
});

d.addEventListener("touchend",e=>{
if(!start||busy)return;

let dx=e.changedTouches[0].clientX-start.x;
let dy=e.changedTouches[0].clientY-start.y;

let t=null;

if(Math.abs(dx)>Math.abs(dy)){
t = dx>20 ? start.i+1 : start.i-1;
}else{
t = dy>20 ? start.i+N : start.i-N;
}

if(valid(start.i,t)){
swapTry(start.i,t);
}

start=null;
});

el.appendChild(d);
}

draw();
}

/* ================= DRAW ================= */

function draw(){
board.forEach(t=>{
t.el.innerHTML=`<img src="img/${t.type}.png">`;
});
}

/* ================= VALID ================= */

function valid(a,b){
if(b<0||b>=36)return false;
let ar=Math.floor(a/N);
let br=Math.floor(b/N);
return !(Math.abs(a-b)==1 && ar!==br);
}

/* ================= SWAP ================= */

function swap(a,b){
[board[a],board[b]]=[board[b],board[a]];
}

/* ================= FIND ================= */

function find(){
let res=[];

/* row */
for(let r=0;r<N;r++){
for(let c=0;c<N-2;c++){
let i=r*N+c;
let t=board[i].type;
if(t&&t===board[i+1].type&&t===board[i+2].type)
res.push(i,i+1,i+2);
}
}

/* col */
for(let c=0;c<N;c++){
for(let r=0;r<N-2;r++){
let i=r*N+c;
let t=board[i].type;
if(t&&t===board[i+N].type&&t===board[i+2*N].type)
res.push(i,i+N,i+2*N);
}
}

return [...new Set(res)];
}

/* ================= RESOLVE (SAFE LOOP) ================= */

function resolve(){

while(true){

let m=find();
if(!m.length){
busy=false;
return;
}

m.forEach(i=>{
board[i].type=safeType(i);
score++;
});

gravity();
draw();

}
}

/* ================= GRAVITY ================= */

function gravity(){
for(let c=0;c<N;c++){
let col=[];

for(let r=N-1;r>=0;r--){
let i=r*N+c;
col.push(board[i].type);
}

for(let r=N-1;r>=0;r--){
let i=r*N+c;
board[i].type=col.shift();
}
}
}

/* ================= SWAP ================= */

function swapTry(a,b){
busy=true;

swap(a,b);
draw();

if(find().length===0){
setTimeout(()=>{
swap(a,b);
draw();
busy=false;
},100);
return;
}

resolve();
}

/* ================= START ================= */

init();

</script>

</body>
</html>
