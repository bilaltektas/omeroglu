<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baharat Patlat ULTRA POWER+</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:system-ui;
overflow:hidden;
color:#fff;

/* 🌈 ENERJİK ARKA PLAN */
background:linear-gradient(120deg,#0b1020,#1a0f2e,#0f2a3d,#1b1f3a);
background-size:300% 300%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* floating glow overlay */
body::before{
content:"";
position:fixed;inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(255,200,0,.15),transparent 40%),
radial-gradient(circle at 80% 30%,rgba(255,0,150,.15),transparent 40%),
radial-gradient(circle at 40% 80%,rgba(0,200,255,.12),transparent 40%);
pointer-events:none;
}

#hud{
position:fixed;top:0;left:0;right:0;height:54px;
display:flex;justify-content:space-between;align-items:center;
padding:0 12px;
background:rgba(10,15,28,.65);
backdrop-filter:blur(10px);
z-index:10;
font-weight:600;font-size:13px;
border-bottom:1px solid rgba(255,255,255,.05)
}

#wrap{
position:absolute;top:54px;left:0;right:0;bottom:0;
display:flex;align-items:center;justify-content:center
}

.board{
width:92vmin;
height:92vmin;
max-width:100vw;
max-height:calc(100vh - 54px);
display:grid;
grid-template-columns:repeat(6,1fr);
gap:3px;
padding:6px;
}

.tile{
background:rgba(255,255,255,.06);
backdrop-filter:blur(6px);
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
transition:transform .12s;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.tile img{
width:100%;height:100%;object-fit:cover;
border-radius:14px;
}

/* 💥 juice pop */
.pop{animation:pop .2s}
@keyframes pop{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

.shake{animation:shake .25s}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
100%{transform:translateX(0)}
}

.flash{
position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none
}
.flash.active{animation:f .2s}
@keyframes f{0%{opacity:.8}100%{opacity:0}}

/* ✨ power glow */
.powerRocket{box-shadow:0 0 12px #ffcc00}
.powerBomb{box-shadow:0 0 14px #ff3b3b}
.powerColor{box-shadow:0 0 14px #7c3aed}

</style>
</head>

<body>

<div id="hud">
<div>⭐ Skor: <span id="score">0</span></div>
<div>🔥 ULTRA MATCH</div>
<div id="state">READY</div>
</div>

<div id="wrap">
<div class="board" id="board"></div>
</div>

<div id="flash"></div>

<script>

const types=["zerdecal","safran","pulbiber","karabiber","kekik","tarcin","sumak","anason"];

let board=[];
let lock=false;
let score=0;

let from=null,startX=0,startY=0;

const scoreEl=document.getElementById("score");
const stateEl=document.getElementById("state");

function rand(){return types[Math.floor(Math.random()*types.length)]}

function init(){
const b=document.getElementById("board");
b.innerHTML="";
board=[];

let start=[];
for(let i=0;i<36;i++) start.push(rand());

for(let i=0;i<36;i++){
let d=document.createElement("div");d.className="tile";
board.push({type:start[i],el:d});

d.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
from=i;
});

d.addEventListener("touchend",e=>{
if(lock) return;

let dx=e.changedTouches[0].clientX-startX;
let dy=e.changedTouches[0].clientY-startY;

let to=null;
if(Math.abs(dx)>Math.abs(dy)) to=dx>0?from+1:from-1;
else to=dy>0?from+6:from-6;

if(valid(from,to)) attempt(from,to);
});

b.appendChild(d);
}

draw();
}

function draw(){
board.forEach(t=>{
if(!t.type) t.type=rand();
t.el.innerHTML=`<img src='img/${t.type}.png'>`;
});
}

function valid(a,b){
if(b<0||b>=36) return false;
let ar=Math.floor(a/6);
let br=Math.floor(b/6);
if(Math.abs(a-b)==1 && ar!=br) return false;
return true;
}

function swap(a,b){[board[a],board[b]]=[board[b],board[a]]}

function attempt(a,b){
lock=true;

swap(a,b);
draw();

let m=find();

if(!m.length){
setTimeout(()=>{
swap(a,b);
draw();
shake(a);shake(b);
lock=false;
},140);
return;
}

setTimeout(()=>resolve(m),100);
}

function find(){
let r=[];

for(let i=0;i<6;i++)for(let j=0;j<4;j++){
let k=i*6+j,t=board[k].type;
if(t&&t==board[k+1].type&&t==board[k+2].type) r.push(k,k+1,k+2)
}

for(let j=0;j<6;j++)for(let i=0;i<4;i++){
let k=i*6+j,t=board[k].type;
if(t&&t==board[k+6].type&&t==board[k+12].type) r.push(k,k+6,k+12)
}

return[...new Set(r)]
}

async function resolve(list){

while(list.length){

list.forEach(i=>{
board[i].type=null;
score+=10;
pop(board[i].el);
flash();
});

update();
draw();
await wait(90);

gravity();
fill();
draw();
await wait(90);

list=find();
}

lock=false;
}

function gravity(){
for(let c=0;c<6;c++){
let col=[];
for(let r=5;r>=0;r--){let i=r*6+c;if(board[i].type) col.push(board[i].type)}
for(let r=5;r>=0;r--){let i=r*6+c;board[i].type=col.shift()||null}
}
}

function fill(){for(let i=0;i<36;i++) if(!board[i].type) board[i].type=rand()}

function pop(el){el.classList.add("pop");setTimeout(()=>el.classList.remove("pop"),200)}
function shake(i){board[i].el.classList.add("shake");setTimeout(()=>board[i].el.classList.remove("shake"),250)}

function flash(){let f=document.getElementById("flash");f.classList.add("active");setTimeout(()=>f.classList.remove("active"),200)}

function update(){scoreEl.innerText=score}

function wait(ms){return new Promise(r=>setTimeout(r,ms))}

init();

</script>
</body>
</html>
