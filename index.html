<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baharat Patlat PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Fredoka',sans-serif;background:#0f172a;color:#fff;text-align:center;overflow:hidden}
#topbar{display:flex;justify-content:space-between;padding:10px;font-size:16px}
.board{width:100vw;height:100vw;max-width:640px;max-height:640px;margin:auto;display:grid;grid-template-columns:repeat(8,1fr);gap:3px}
.tile{background:#1e293b;border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;transition:.25s}
.tile img{width:100%}
.ice{background:#93c5fd55}
.lock{background:#64748b}
.power{position:absolute;font-size:22px}
.comboText{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-size:40px;color:gold;animation:comboAnim 1.2s forwards}
@keyframes comboAnim{
 0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}
 50%{transform:translate(-50%,-60%) scale(1.2);opacity:1}
 100%{transform:translate(-50%,-80%) scale(1);opacity:0}
}
</style>
</head>
<body>
<h2>🌶️ Baharat Patlat</h2>
<div id="topbar"><div id="moves"></div><div id="goal"></div></div>
<div id="game"><div id="board" class="board"></div></div>

<script>
const types=["zerdecal","safran","pulbiber","karabiber","kekik","tarcin","sumak","anason"];
let board=[],moves=30,combo=0,level=1,targetType,targetCount;

const movesEl=document.getElementById("moves");
const goalEl=document.getElementById("goal");

function startLevel(lvl){
 level=lvl;
 moves=level*5;

 targetType=types[Math.floor(Math.random()*types.length)];
 targetCount=15+level;

 init();
 updateUI();
}

function updateUI(){
 movesEl.innerText="Hamle: "+moves;
 goalEl.innerText="Hedef: "+targetType+" x"+targetCount;
}

function init(){
 const b=document.getElementById("board");
 b.innerHTML="";
 board=[];

 for(let i=0;i<64;i++){
  let t={type:rand(),power:null,ice:false,lock:false,el:null};

  // LEVEL DESIGN
  if(level>10 && level<=20 && Math.random()<0.2) t.ice=true;
  if(level>20 && level<=30 && Math.random()<0.15) t.lock=true;

  let d=document.createElement("div");
  d.className="tile";
  t.el=d;

  d.addEventListener("touchstart",e=>start(e,i));
  d.addEventListener("touchend",e=>end(e,i));

  board.push(t);
  b.appendChild(d);
 }
 draw();
}

function rand(){return types[Math.floor(Math.random()*types.length)]}

function draw(){
 board.forEach(t=>{
  t.el.className="tile";
  if(t.ice) t.el.classList.add("ice");
  if(t.lock) t.el.classList.add("lock");

  t.el.innerHTML=`<img src="img/${t.type}.png">`;
 });
}

let touch=null;
function start(e,i){touch={x:e.touches[0].clientX,y:e.touches[0].clientY,i}}

function end(e){
 if(!touch||moves<=0) return;
 let dx=e.changedTouches[0].clientX-touch.x;
 let dy=e.changedTouches[0].clientY-touch.y;
 let from=touch.i,to=null;

 if(Math.abs(dx)>Math.abs(dy)){
  if(dx>20) to=from+1;
  else if(dx<-20) to=from-1;
 }else{
  if(dy>20) to=from+8;
  else if(dy<-20) to=from-8;
 }

 if(valid(from,to)) handleSwap(from,to);
 touch=null;
}

function valid(a,b){
 if(b<0||b>=64) return false;
 let ar=Math.floor(a/8),br=Math.floor(b/8);
 if(Math.abs(a-b)===1 && ar!==br) return false;
 if(board[a].lock||board[b].lock) return false;
 return true;
}

function handleSwap(a,b){
 swap(a,b);
 let m=findMatches();
 if(!m.length){ swap(a,b); }
 else{
  moves--;updateUI();
  combo=0;
  process(m);
 }
}

function swap(a,b){[board[a],board[b]]=[board[b],board[a]];draw()}

function findMatches(){
 let res=[];

 // yatay
 for(let r=0;r<8;r++){
  for(let c=0;c<6;c++){
   let i=r*8+c,t=board[i].type;
   if(t&&t===board[i+1].type&&t===board[i+2].type) res.push(i,i+1,i+2);
  }
 }

 // dikey
 for(let c=0;c<8;c++){
  for(let r=0;r<6;r++){
   let i=r*8+c,t=board[i].type;
   if(t&&t===board[i+8].type&&t===board[i+16].type) res.push(i,i+8,i+16);
  }
 }

 return [...new Set(res)];
}

function process(m){
 combo++;
 showCombo(combo);

 m.forEach(i=>{
  let t=board[i];

  if(t.ice){ t.ice=false; return; }

  if(t.type===targetType) targetCount--;

  t.type=null;
 });

 setTimeout(()=>{
  drop(); refill();
  updateUI();

  if(targetCount<=0){ alert("Level Tamam!"); startLevel(level+1); }

  check();
 },300);
}

function drop(){
 for(let c=0;c<8;c++){
  for(let r=7;r>=0;r--){
   let i=r*8+c;
   if(!board[i].type){
    for(let k=r-1;k>=0;k--){
     let above=k*8+c;
     if(board[above].type){
      board[i].type=board[above].type;
      board[above].type=null;
      break;
     }
    }
   }
  }
 }
}

function refill(){
 for(let i=0;i<64;i++){
  if(!board[i].type) board[i].type=rand();
 }
 draw();
}

function check(){
 let m=findMatches();
 if(m.length) process(m);
}

function showCombo(x){
 let d=document.createElement("div");
 d.className="comboText";
 d.innerText="COMBO x"+x;
 document.body.appendChild(d);
 setTimeout(()=>d.remove(),1200);
}

startLevel(1);
</script>
</body>
</html>
