<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baharat Patlat • FLOW</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Fredoka',sans-serif;
  background:#0f172a;
  color:#fff;
  text-align:center;
}

h1{margin:10px}

.top{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.box{
  background:#1e293b;
  padding:8px 12px;
  border-radius:10px;
  font-size:13px;
}

.board{
  width:92vmin;
  height:92vmin;
  margin:10px auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:6px;
}

.tile{
  background:#1e293b;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.12s;
}

.tile:hover{transform:scale(1.05)}

.tile img{width:80%}

.selected{outline:3px solid gold}

.explode{animation:explode .2s}
@keyframes explode{
  0%{transform:scale(1)}
  100%{transform:scale(0);opacity:0}
}

.fall{animation:fall .18s}
@keyframes fall{
  from{transform:translateY(-30px)}
  to{transform:translateY(0)}
}

.combo{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:36px;
  color:#facc15;
  animation:fade .8s forwards;
}

@keyframes fade{
  to{opacity:0; transform:translate(-50%,-80%)}
}
</style>

</head>

<body>

<h1>🌶️ Baharat Patlat FLOW</h1>

<div class="top">
  <div class="box">Level: <span id="lvl">1</span></div>
  <div class="box">Gram: <span id="gram">0g</span></div>
  <div class="box">Hedef: <span id="goal">30g</span></div>
  <div class="box">Combo: <span id="cmb">1x</span></div>
</div>

<div class="board" id="board"></div>

<script>
const SIZE=8;
const types=["zerdecal","safran","pulbiber","karabiber","kekik","tarcin","sumak","anason"];

let board=[],selected=null;
let gram=0,level=1,goal=30,combo=1;
let busy=false;

const boardEl=document.getElementById("board");

function rand(){return types[Math.floor(Math.random()*types.length)]}

function createTile(type){
  return {type:type,el:null};
}

function render(t){
  t.el.innerHTML = t.type ? `<img src="${t.type}.png">` : "";
}

function init(){
  board=[];
  boardEl.innerHTML="";
  for(let i=0;i<SIZE*SIZE;i++){
    let t=createTile(rand());
    let d=document.createElement("div");
    d.className="tile";
    t.el=d;
    d.onclick=()=>click(i);
    board.push(t);
    boardEl.appendChild(d);
  }
  draw();
  loop(); // 🔥 sürekli kontrol
}

function draw(){board.forEach(render)}

function click(i){
  if(busy)return;

  if(selected===null){
    selected=i;
    board[i].el.classList.add("selected");
  }else{
    if(adj(selected,i)){
      swap(selected,i);
    }
    board[selected].el.classList.remove("selected");
    selected=null;
  }
}

function adj(a,b){
  let ar=Math.floor(a/SIZE),ac=a%SIZE;
  let br=Math.floor(b/SIZE),bc=b%SIZE;
  return Math.abs(ar-br)+Math.abs(ac-bc)===1;
}

function swap(a,b){
  [board[a],board[b]]=[board[b],board[a]];
  draw();
}

function findMatches(){
  let res=[];
  for(let i=0;i<SIZE*SIZE;i++){
    let t=board[i].type;
    if(!t)continue;

    if(i%SIZE<6 && t===board[i+1].type && t===board[i+2].type)
      res.push(i,i+1,i+2);

    if(i<SIZE*(SIZE-2) && t===board[i+SIZE].type && t===board[i+SIZE*2].type)
      res.push(i,i+SIZE,i+SIZE*2);
  }
  return [...new Set(res)];
}

function showCombo(x){
  let d=document.createElement("div");
  d.className="combo";
  d.innerText="x"+x;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),800);
}

function process(m){
  busy=true;
  combo++;
  document.getElementById("cmb").innerText=combo+"x";

  if(combo>1) showCombo(combo);

  m.forEach(i=>{
    board[i].el.classList.add("explode");
  });

  setTimeout(()=>{
    m.forEach(i=>board[i]=createTile(null));

    // 🎯 gram zorlaştırılmış
    gram += Math.floor(m.length * combo * 0.7);

    update();
    drop();
  },200);
}

function drop(){
  for(let c=0;c<SIZE;c++){
    for(let r=SIZE-1;r>=0;r--){
      let i=r*SIZE+c;
      if(!board[i].type){
        for(let k=r-1;k>=0;k--){
          let a=k*SIZE+c;
          if(board[a].type){
            board[i]=board[a];
            board[a]=createTile(null);
            break;
          }
        }
        if(!board[i].type) board[i]=createTile(rand());
      }
    }
  }

  setTimeout(()=>{
    draw();
    busy=false;
  },150);
}

function loop(){
  if(!busy){
    let m=findMatches();
    if(m.length){
      process(m);
    }else{
      combo=1;
      document.getElementById("cmb").innerText="1x";
    }
  }
  requestAnimationFrame(loop);
}

function update(){
  document.getElementById("lvl").innerText=level;
  document.getElementById("gram").innerText=gram+"g";
  document.getElementById("goal").innerText=goal+"g";

  if(gram>=goal){
    setTimeout(()=>{
      alert("🎉 Level geçti!");
      nextLevel();
    },200);
  }
}

function nextLevel(){
  level++;

  // 🎯 zorluk eğrisi
  goal = Math.floor(30 + level*5 + Math.pow(level,1.5));

  gram=0;
  combo=1;
  init();
}

init();
</script>

</body>
</html>
