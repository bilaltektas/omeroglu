<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baharat Patlat PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Fredoka',sans-serif;
background:#0f172a;
color:#fff;
text-align:center;
}

/* ===== MAP ===== */
#map{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:20px;
}

.levelBtn{
width:60px;height:60px;
background:#1e293b;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.locked{opacity:.3}

/* ===== GAME ===== */
#game{display:none}

.board{
width:92vmin;
height:92vmin;
margin:auto;
display:grid;
grid-template-columns:repeat(8,1fr);
gap:6px;
}

.tile{
background:#1e293b;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
}

.tile img{width:80%}

.selected{outline:3px solid gold}

.explode{animation:explode .2s}
@keyframes explode{to{transform:scale(0);opacity:0}}

.combo{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:30px;
color:gold;
animation:fade .8s forwards;
}
@keyframes fade{to{opacity:0}}

#reward{
display:none;
position:fixed;
inset:0;
background:#000c;
align-items:center;
justify-content:center;
flex-direction:column;
}

.rewardBox{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.spice{
width:60px;
margin:10px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>🌶️ Baharat Patlat</h1>

<div id="map"></div>

<div id="game">
<div id="board" class="board"></div>
</div>

<div id="reward">
<div class="rewardBox">
<h2>🎁 Tebrikler!</h2>
<p>Dilediğiniz baharatı seçebilirsiniz</p>
<div id="spiceList"></div>
</div>
</div>

<script>
const types=["zerdecal","safran","pulbiber","karabiber","kekik","tarcin","sumak","anason"];
let unlocked=Number(localStorage.getItem("lvl"))||1;

/* ===== MAP ===== */
const mapEl=document.getElementById("map");

function createMap(){
mapEl.innerHTML="";
for(let i=1;i<=30;i++){
let d=document.createElement("div");
d.className="levelBtn"+(i>unlocked?" locked":"");
d.innerText=i;
if(i<=unlocked){
d.onclick=()=>startLevel(i);
}
mapEl.appendChild(d);
}
}

/* ===== GAME ===== */
let SIZE=8,board=[],selected=null,combo=1,gram=0,goal=30,level=1;

function startLevel(lvl){
level=lvl;
mapEl.style.display="none";
document.getElementById("game").style.display="block";

init();
}

function init(){
board=[];
let boardEl=document.getElementById("board");
boardEl.innerHTML="";

for(let i=0;i<64;i++){
let t={type:rand(),el:null};
let d=document.createElement("div");
d.className="tile";
t.el=d;
d.onclick=()=>click(i);
board.push(t);
boardEl.appendChild(d);
}
draw();
}

function rand(){return types[Math.floor(Math.random()*types.length)]}

function draw(){
board.forEach(t=>{
t.el.innerHTML=`<img src="img/${t.type}.png">`;
});
}

function click(i){
if(selected===null){
selected=i;
board[i].el.classList.add("selected");
}else{
swap(selected,i);
board[selected].el.classList.remove("selected");
selected=null;
}
}

function swap(a,b){
[board[a],board[b]]=[board[b],board[a]];
draw();
check();
}

function check(){
let m=findMatches();
if(m.length) process(m);
}

function findMatches(){
let res=[];
for(let i=0;i<64;i++){
let t=board[i].type;
if(i%8<6 && t===board[i+1].type && t===board[i+2].type)
res.push(i,i+1,i+2);
}
return [...new Set(res)];
}

/* ===== POWER UPS ===== */
function process(m){
combo++;
showCombo(combo);

if(m.length>=4) rocket(m[0]);
if(m.length>=5) bomb(m[0]);

m.forEach(i=>{
board[i].el.classList.add("explode");
});

setTimeout(()=>{
m.forEach(i=>board[i].type=rand());
draw();
gram+=1;
if(gram>=100) showReward();
},200);
}

function rocket(i){
let row=Math.floor(i/8);
for(let c=0;c<8;c++){
board[row*8+c].type=null;
}
}

function bomb(i){
let r=Math.floor(i/8),c=i%8;
for(let dr=-1;dr<=1;dr++){
for(let dc=-1;dc<=1;dc++){
let nr=r+dr,nc=c+dc;
if(nr>=0 && nc>=0 && nr<8 && nc<8){
board[nr*8+nc].type=null;
}
}
}
}

/* ===== COMBO ===== */
function showCombo(x){
let d=document.createElement("div");
d.className="combo";
d.innerText="x"+x;
document.body.appendChild(d);
setTimeout(()=>d.remove(),800);
}

/* ===== REWARD ===== */
function showReward(){
document.getElementById("reward").style.display="flex";

let list=document.getElementById("spiceList");
list.innerHTML="";

types.forEach(t=>{
let img=document.createElement("img");
img.src="img/"+t+".png";
img.className="spice";
img.onclick=()=>alert("Seçildi: "+t);
list.appendChild(img);
});
}

/* ===== START ===== */
createMap();
</script>

</body>
</html>
