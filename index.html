<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baharat Patlat ULTRA</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Fredoka',sans-serif;background:#0b1220;color:#fff;overflow:hidden}

#ui{
display:flex;justify-content:space-between;
padding:10px;font-size:14px;align-items:center}

#flash{
position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none}
.flash{animation:flash .18s}
@keyframes flash{0%{opacity:.9}100%{opacity:0}}

#wrap{
width:100vw;height:calc(100vh - 40px);
display:flex;align-items:center;justify-content:center}

.board{
width:100vmin;height:100vmin;
max-width:100vw;max-height:100vw;
display:grid;
grid-template-columns:repeat(8,1fr);
gap:2px;padding:4px}

.tile{
background:#172033;
border-radius:10px;
display:flex;align-items:center;justify-content:center;
position:relative;
transition:transform .12s ease
}

.tile img{width:92%}

.pop{animation:pop .22s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}

.particle{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none}

.hint{outline:2px solid gold}
</style>
</head>
<body>

<div id="flash"></div>

<div id="ui">
<div id="moves">Hamle: 0</div>
<div id="score">Skor: 0</div>
<div id="level">Lvl: 1</div>
</div>

<div id="wrap">
<div id="board" class="board"></div>
</div>

<script>
const types=["zerdecal","safran","pulbiber","karabiber","kekik","tarcin","sumak","anason"];

let board=[];
let queue=[];
let processing=false;

let moves=0;
let score=0;
let level=1;

const movesEl=document.getElementById("moves");
const scoreEl=document.getElementById("score");
const levelEl=document.getElementById("level");

function rand(){return types[Math.floor(Math.random()*types.length)]}

// SAFE START BOARD (NO MATCH)
function generateBoard(){
let arr;
do{
arr=[];
for(let i=0;i<64;i++) arr.push(rand());
}while(hasMatch(arr));
return arr;
}

function hasMatch(arr){
for(let r=0;r<8;r++){
for(let c=0;c<6;c++){
let i=r*8+c;
let t=arr[i];
if(t&&t===arr[i+1]&&t===arr[i+2]) return true;
}
}
for(let c=0;c<8;c++){
for(let r=0;r<6;r++){
let i=r*8+c;
let t=arr[i];
if(t&&t===arr[i+8]&&t===arr[i+16]) return true;
}
}
return false;
}

function init(){
const b=document.getElementById("board");
b.innerHTML="";
board=[];

let start=generateBoard();

for(let i=0;i<64;i++){
let d=document.createElement("div");
d.className="tile";

board.push({type:start[i],el:d});

// POINTER DRAG (ULTRA UX)
let startX,startY,from=i;

d.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
from=i;
});

d.addEventListener("touchend",e=>{
if(processing) return;

let dx=e.changedTouches[0].clientX-startX;
let dy=e.changedTouches[0].clientY-startY;

let to=null;

if(Math.abs(dx)>Math.abs(dy)){
if(dx>25) to=from+1;
else if(dx<-25) to=from-1;
}else{
if(dy>25) to=from+8;
else if(dy<-25) to=from-8;
}

if(valid(from,to)) queue.push({from,to});
processQueue();
});

b.appendChild(d);
}

draw();
}

function draw(){
board.forEach(t=>{
t.el.innerHTML=`<img src="img/${t.type}.png">`;
});
}

function valid(a,b){
if(b<0||b>=64) return false;
let ar=Math.floor(a/8);
let br=Math.floor(b/8);
if(Math.abs(a-b)===1 && ar!==br) return false;
return true;
}

function processQueue(){
if(processing) return;
if(queue.length===0) return;

processing=true;
let m=queue.shift();
execute(m.from,m.to);
}

function execute(a,b){
swap(a,b);
let matches=find();

if(matches.length===0){
setTimeout(()=>{
swap(a,b);
processing=false;
processQueue();
},120);
return;
}

resolve(matches).then(()=>{
processing=false;
processQueue();
});
}

function swap(a,b){
[board[a],board[b]]=[board[b],board[a]];
draw();
}

function find(){
let res=[];

for(let r=0;r<8;r++){
for(let c=0;c<6;c++){
let i=r*8+c,t=board[i].type;
if(t&&t===board[i+1].type&&t===board[i+2].type) res.push(i,i+1,i+2);
}
}

for(let c=0;c<8;c++){
for(let r=0;r<6;r++){
let i=r*8+c,t=board[i].type;
if(t&&t===board[i+8].type&&t===board[i+16].type) res.push(i,i+8,i+16);
}
}

return [...new Set(res)];
}

async function resolve(matches){

while(matches.length){

matches.forEach(i=>{
board[i].type=null;
board[i].el.classList.add("pop");
spawn(board[i].el);
score+=10;
});

updateUI();
draw();
await wait(110);

gravity();
fill();
draw();
await wait(110);

matches=find();
}

level=Math.floor(score/300)+1;
levelEl.innerText="Lvl: "+level;
}

function gravity(){
for(let c=0;c<8;c++){
let col=[];
for(let r=7;r>=0;r--){
let i=r*8+c;
if(board[i].type) col.push(board[i].type);
}
for(let r=7;r>=0;r--){
let i=r*8+c;
board[i].type=col.shift()||null;
}
}
}

function fill(){
for(let i=0;i<64;i++){
if(!board[i].type) board[i].type=rand();
}
}

function spawn(el){
let r=el.getBoundingClientRect();
for(let i=0;i<10;i++){
let p=document.createElement("div");
p.className="particle";
p.style.background=`hsl(${Math.random()*360},100%,60%)`;
p.style.left=r.left+r.width/2+"px";
p.style.top=r.top+r.height/2+"px";
document.body.appendChild(p);

let dx=(Math.random()-0.5)*160;
let dy=(Math.random()-0.5)*160;

p.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${dx}px,${dy}px)`,opacity:0}
],{duration:450});

setTimeout(()=>p.remove(),450);
}
flash();
}

function flash(){
let f=document.getElementById("flash");
f.classList.add("flash");
setTimeout(()=>f.classList.remove("flash"),180);
}

function updateUI(){
moves++;
movesEl.innerText="Hamle: "+moves;
scoreEl.innerText="Skor: "+score;
}

function wait(ms){return new Promise(r=>setTimeout(r,ms));}

init();
</script>

</body>
</html>
