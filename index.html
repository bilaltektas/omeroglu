<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baharat Patlat PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Fredoka',sans-serif;background:#0f172a;color:#fff;text-align:center;overflow:hidden}
#map{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:10px}
.levelBtn{width:50px;height:50px;background:#1e293b;border-radius:10px;display:flex;align-items:center;justify-content:center}
.locked{opacity:.3}
#game{display:none}
.board{width:96vw;height:96vw;max-width:500px;max-height:500px;margin:auto;display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.tile{background:#1e293b;border-radius:10px;display:flex;align-items:center;justify-content:center;touch-action:none}
.tile img{width:80%}
.selected{outline:2px solid gold}
.explode{animation:explode .2s}
@keyframes explode{to{transform:scale(0);opacity:0}}
.combo{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:28px;color:gold;animation:fade .8s forwards}
@keyframes fade{to{opacity:0}}
</style>
</head>
<body>
<h2>🌶️ Baharat Patlat</h2>
<div id="map"></div>
<div id="game"><div id="board" class="board"></div></div>
<script>
const types=["zerdecal","safran","pulbiber","karabiber","kekik","tarcin","sumak","anason"];
let unlocked=Number(localStorage.getItem("lvl"))||1;
const mapEl=document.getElementById("map");

function createMap(){
 mapEl.innerHTML="";
 for(let i=1;i<=100;i++){
  let d=document.createElement("div");
  d.className="levelBtn"+(i>unlocked?" locked":"");
  d.innerText=i;
  if(i<=unlocked) d.onclick=()=>startLevel(i);
  mapEl.appendChild(d);
 }
}

let SIZE=8,board=[],start=null,level=1,gram=0;

function startLevel(lvl){
 level=lvl;
 mapEl.style.display="none";
 document.getElementById("game").style.display="block";
 init();
}

function init(){
 board=[];
 const boardEl=document.getElementById("board");
 boardEl.innerHTML="";
 for(let i=0;i<64;i++){
  let t={type:rand(),el:null};
  let d=document.createElement("div");
  d.className="tile";
  t.el=d;

  d.addEventListener("touchstart",e=>touchStart(e,i));
  d.addEventListener("touchend",e=>touchEnd(e,i));

  board.push(t);
  boardEl.appendChild(d);
 }
 draw();
}

function rand(){return types[Math.floor(Math.random()*types.length)]}

function draw(){
 board.forEach(t=>{
  t.el.innerHTML=t.type?`<img src="img/${t.type}.png">`:"";
 });
}

let touchPos=null;
function touchStart(e,i){
 touchPos={x:e.touches[0].clientX,y:e.touches[0].clientY,index:i};
}

function touchEnd(e,i){
 if(!touchPos) return;
 let dx=e.changedTouches[0].clientX-touchPos.x;
 let dy=e.changedTouches[0].clientY-touchPos.y;
 let from=touchPos.index;
 let to=null;

 if(Math.abs(dx)>Math.abs(dy)){
  if(dx>20) to=from+1;
  else if(dx<-20) to=from-1;
 }else{
  if(dy>20) to=from+8;
  else if(dy<-20) to=from-8;
 }

 if(to!==null && validMove(from,to)){
  swap(from,to);
 }
 touchPos=null;
}

function validMove(a,b){
 if(b<0||b>=64) return false;
 let ar=Math.floor(a/8),br=Math.floor(b/8);
 if(Math.abs(a-b)===1 && ar!==br) return false;
 return true;
}

function swap(a,b){
 [board[a],board[b]]=[board[b],board[a]];
 draw();
 check();
}

function check(){
 let m=findMatches();
 if(m.length) process(m);
}

function findMatches(){
 let res=[];

 // horizontal
 for(let r=0;r<8;r++){
  for(let c=0;c<6;c++){
   let i=r*8+c;
   let t=board[i].type;
   if(t && t===board[i+1].type && t===board[i+2].type){
    res.push(i,i+1,i+2);
   }
  }
 }

 // vertical
 for(let c=0;c<8;c++){
  for(let r=0;r<6;r++){
   let i=r*8+c;
   let t=board[i].type;
   if(t && t===board[i+8].type && t===board[i+16].type){
    res.push(i,i+8,i+16);
   }
  }
 }

 return [...new Set(res)];
}

function process(m){
 m.forEach(i=>board[i].el.classList.add("explode"));
 setTimeout(()=>{
  m.forEach(i=>board[i].type=rand());
  draw();
  gram++;

  if(gram>=level){
   nextLevel();
  }
 },200);
}

function nextLevel(){
 unlocked=Math.max(unlocked,level+1);
 localStorage.setItem("lvl",unlocked);
 alert("Level tamam! Toplanan gram: "+gram);
 gram=0;
 createMap();
 document.getElementById("game").style.display="none";
 mapEl.style.display="flex";
}

createMap();
</script>
</body>
</html>
