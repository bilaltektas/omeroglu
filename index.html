<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baharat Saga FIXED PRO</title>
<style>
*{box-sizing:border-box}
body{margin:0;overflow:hidden;font-family:sans-serif;background:#0b1020;color:#fff}

#hud{
position:fixed;top:0;left:0;right:0;height:50px;
display:flex;justify-content:space-between;align-items:center;
padding:0 10px;background:#0008;z-index:10
}

#wrap{
position:absolute;top:50px;bottom:0;left:0;right:0;
display:flex;justify-content:center;align-items:center
}

.board{
width:95vmin;height:95vmin;
display:grid;grid-template-columns:repeat(6,1fr);
gap:4px;padding:6px
}

.tile{
background:#1e293b;
border-radius:12px;
display:flex;align-items:center;justify-content:center;
transition:transform .2s;
}
.tile img{width:100%;height:100%;object-fit:cover;border-radius:12px}

.swap{transform:scale(.9)}
.pop{animation:pop .25s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

</style>
</head>
<body>

<div id="hud">
<div>Score: <span id="score">0</span></div>
<div>Moves: <span id="moves">30</span></div>
</div>

<div id="wrap">
<div id="board" class="board"></div>
</div>

<script>

const types=["zerdecal","safran","pulbiber","karabiber","kekik","tarcin","sumak","anason"];

let board=[];
let size=6;
let selected=null;
let busy=false;
let score=0;
let moves=30;

function rand(){return types[Math.floor(Math.random()*types.length)]}

function init(){
const el=document.getElementById("board");
el.innerHTML="";
board=[];

for(let i=0;i<size*size;i++){
let d=document.createElement("div");
d.className="tile";
d.dataset.index=i;

let obj={type:rand(),el:d};
board.push(obj);

// CLICK + DRAG
let start=null;

d.addEventListener("touchstart",e=>{
start={x:e.touches[0].clientX,y:e.touches[0].clientY,i};
});

d.addEventListener("touchend",e=>{
if(busy||moves<=0)return;
let dx=e.changedTouches[0].clientX-start.x;
let dy=e.changedTouches[0].clientY-start.y;

let target=null;
if(Math.abs(dx)>Math.abs(dy)){
target = dx>0? i+1 : i-1;
}else{
target = dy>0? i+size : i-size;
}

if(valid(i,target)) swapTry(i,target);
});

el.appendChild(d);
}

draw();
removeInitialMatches();
}

function draw(){
board.forEach(t=>{
t.el.innerHTML=`<img src="img/${t.type}.png">`;
});
}

function valid(a,b){
if(b<0||b>=36)return false;
let ar=Math.floor(a/size),br=Math.floor(b/size);
if(Math.abs(a-b)==1 && ar!=br)return false;
return true;
}

function swap(a,b){
[board[a],board[b]]=[board[b],board[a]];
}

function swapTry(a,b){
busy=true;
moves--;
updateHUD();

swap(a,b);
animateSwap(a,b);

draw();

let m=findMatches();

if(!m.length){
setTimeout(()=>{
swap(a,b);
animateSwap(a,b);
draw();
busy=false;
},200);
return;
}

setTimeout(()=>resolve(),200);
}

function animateSwap(a,b){
board[a].el.classList.add("swap");
board[b].el.classList.add("swap");
setTimeout(()=>{
board[a].el.classList.remove("swap");
board[b].el.classList.remove("swap");
},200);
}

function findMatches(){
let res=[];

// rows
for(let r=0;r<size;r++){
for(let c=0;c<size-2;c++){
let i=r*size+c;
let t=board[i].type;
if(t==board[i+1].type && t==board[i+2].type){
res.push(i,i+1,i+2);
}
}
}

// cols
for(let c=0;c<size;c++){
for(let r=0;r<size-2;r++){
let i=r*size+c;
let t=board[i].type;
if(t==board[i+size].type && t==board[i+size*2].type){
res.push(i,i+size,i+size*2);
}
}
}

return [...new Set(res)];
}

async function resolve(){
let m=findMatches();

while(m.length){

m.forEach(i=>{
board[i].el.classList.add("pop");
board[i].type=null;
score+=10;
});

updateHUD();
await wait(200);

fall();
fill();
draw();

await wait(200);

m=findMatches();
}

busy=false;
}

function fall(){
for(let c=0;c<size;c++){
let col=[];
for(let r=size-1;r>=0;r--){
let i=r*size+c;
if(board[i].type) col.push(board[i].type);
}

for(let r=size-1;r>=0;r--){
let i=r*size+c;
board[i].type = col.shift() || null;
}
}
}

function fill(){
for(let i=0;i<36;i++){
if(!board[i].type) board[i].type=rand();
}
}

function removeInitialMatches(){
let m=findMatches();
while(m.length){
m.forEach(i=>board[i].type=rand());
m=findMatches();
}
draw();
}

function updateHUD(){
document.getElementById("score").innerText=score;
document.getElementById("moves").innerText=moves;
}

function wait(ms){return new Promise(r=>setTimeout(r,ms))}

init();

</script>

</body>
</html>
