<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baharat Saga STABLE FINAL</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
overflow:hidden;
background:#070b18;
font-family:sans-serif;
color:#fff;
}

#hud{
position:fixed;
top:0;left:0;right:0;
height:52px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
background:#0009;
z-index:10;
}

#wrap{
position:absolute;
top:52px;bottom:0;left:0;right:0;
display:flex;
justify-content:center;
align-items:center;
}

.board{
width:min(100vw,100vh-52px);
height:min(100vw,100vh-52px);
display:grid;
grid-template-columns:repeat(6,1fr);
gap:5px;
padding:6px;
}

.tile{
background:#1e293b;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
transition:transform .12s ease;
}

.tile img{
width:100%;
height:100%;
object-fit:cover;
}

.flash{
position:fixed;
inset:0;
background:#fff;
opacity:0;
pointer-events:none;
}

.flash.active{animation:flash .15s}

@keyframes flash{0%{opacity:.6}100%{opacity:0}}

.particle{
position:fixed;
width:5px;height:5px;
background:#fff;
border-radius:50%;
pointer-events:none;
animation:part .35s forwards;
}

@keyframes part{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}
</style>
</head>

<body>

<div id="hud">
<div>🌶 Gram: <span id="score">0</span></div>
<div>♾ Stable</div>
</div>

<div id="wrap">
<div id="board" class="board"></div>
</div>

<div id="flash" class="flash"></div>

<script>

const TYPES=["zerdecal","safran","pulbiber","karabiber","kekik","tarcin","sumak","anason"];

let size=6;
let board=[];
let busy=false;
let score=0;
let start=null;

function rand(){
return TYPES[Math.floor(Math.random()*TYPES.length)];
}

function img(t){
return "img/"+t+".png";
}

function init(){
const el=document.getElementById("board");
el.innerHTML="";
board=[];

for(let i=0;i<size*size;i++){

let d=document.createElement("div");
d.className="tile";

board.push({type:rand(),el:d});

d.addEventListener("touchstart",e=>{
if(busy)return;
start={
i,
x:e.touches[0].clientX,
y:e.touches[0].clientY
};
});

d.addEventListener("touchend",e=>{
if(!start||busy)return;

let dx=e.changedTouches[0].clientX-start.x;
let dy=e.changedTouches[0].clientY-start.y;

let target=null;

if(Math.abs(dx)>Math.abs(dy)){
if(dx>25) target=start.i+1;
else if(dx<-25) target=start.i-1;
}else{
if(dy>25) target=start.i+size;
else if(dy<-25) target=start.i-size;
}

if(validSwap(start.i,target)){
swapTry(start.i,target);
}

start=null;
});

el.appendChild(d);
}

draw();
clean();
ensurePlayable();
}

function draw(){
board.forEach(t=>{
t.el.innerHTML=`<img src="${img(t.type)}" onerror="this.src='img/zerdecal.png'">`;
});
}

function validSwap(a,b){
if(b<0||b>=36)return false;

let ar=Math.floor(a/6);
let br=Math.floor(b/6);

if(Math.abs(a-b)==1 && ar!==br) return false;

return true;
}

function swap(a,b){
[board[a],board[b]]=[board[b],board[a]];
}

function swapTry(a,b){
busy=true;

swap(a,b);
draw();

let m=find();

if(!m.length){
setTimeout(()=>{
swap(a,b);
draw();
busy=false;
},120);
return;
}

setTimeout(()=>resolve(),120);
}

function resolve(){

let m=find();

if(!m.length){
busy=false;
ensurePlayable();
return;
}

m.forEach(i=>{
board[i].type=null;
score++;
spawn(board[i].el);
});

update();

setTimeout(()=>{
fall();
fillSafe();
draw();
resolve();
},80);
}

function find(){
let res=[];

for(let r=0;r<6;r++){
for(let c=0;c<4;c++){
let i=r*6+c;
let t=board[i].type;

if(t && t===board[i+1].type && t===board[i+2].type){
res.push(i,i+1,i+2);
}
}
}

for(let c=0;c<6;c++){
for(let r=0;r<4;r++){
let i=r*6+c;
let t=board[i].type;

if(t && t===board[i+6].type && t===board[i+12].type){
res.push(i,i+6,i+12);
}
}
}

return [...new Set(res)];
}

function fall(){
for(let c=0;c<6;c++){
let col=[];

for(let r=5;r>=0;r--){
let i=r*6+c;
if(board[i].type) col.push(board[i].type);
}

for(let r=5;r>=0;r--){
let i=r*6+c;
board[i].type=col.shift()||null;
}
}
}

function fillSafe(){
for(let i=0;i<board.length;i++){
if(!board[i].type){
board[i].type=rand();
}
}
}

function clean(){
let m=find();
while(m.length){
m.forEach(i=>board[i].type=rand());
m=find();
}
draw();
}

function ensurePlayable(){
if(hasMove()) return;

for(let i=0;i<10;i++){
shuffle();
if(hasMove()) return;
}

resetBoard();
}

function hasMove(){
for(let i=0;i<board.length;i++){
for(let d of [1,6]){
let j=i+d;
if(!validSwap(i,j)) continue;

swap(i,j);
let ok=find().length>0;
swap(i,j);

if(ok) return true;
}
}
return false;
}

function shuffle(){
for(let i=board.length-1;i>0;i--){
let j=Math.floor(Math.random()*i);
[board[i].type,board[j].type]=[board[j].type,board[i].type];
}
}

function resetBoard(){
for(let i=0;i<board.length;i++){
board[i].type=rand();
}
draw();
}

function spawn(el){
let r=el.getBoundingClientRect();

for(let i=0;i<4;i++){
let p=document.createElement("div");
p.className="particle";

p.style.left=r.left+r.width/2+"px";
p.style.top=r.top+r.height/2+"px";

let a=Math.random()*Math.PI*2;
let d=20+Math.random()*25;

p.style.setProperty("--x",Math.cos(a)*d+"px");
p.style.setProperty("--y",Math.sin(a)*d+"px");

document.body.appendChild(p);
setTimeout(()=>p.remove(),350);
}
}

function update(){
document.getElementById("score").innerText=score;
}

init();

</script>

</body>
</html>
