<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baharat Saga ULTRA STORE</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;overflow:hidden;color:#fff;background:#050814}

#bg{
position:fixed;inset:0;z-index:0;
background:radial-gradient(circle at 20% 20%,#ffcc0030,transparent 40%),
radial-gradient(circle at 70% 30%,#ff3b9a30,transparent 45%),
radial-gradient(circle at 50% 80%,#3bd1ff30,transparent 40%),
linear-gradient(120deg,#050814,#0b1030,#12081f);
animation:bg 10s ease infinite;
}
@keyframes bg{0%{filter:hue-rotate(0)}50%{filter:hue-rotate(25deg)}100%{filter:hue-rotate(0)}}

#hud{
position:fixed;top:0;left:0;right:0;height:60px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(10px);
display:flex;justify-content:space-between;align-items:center;
padding:0 10px;z-index:5;font-size:12px
}

#wrap{position:absolute;top:60px;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:center}

.board{
width:92vmin;height:92vmin;
display:grid;grid-template-columns:repeat(6,1fr);gap:3px;padding:6px
}

.tile{
background:rgba(255,255,255,.06);
border-radius:12px;
overflow:hidden;
display:flex;align-items:center;justify-content:center;
position:relative
}
.tile img{width:100%;height:100%;object-fit:cover}

.pop{animation:pop .2s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

.flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none}
.flash.active{animation:f .2s}
@keyframes f{0%{opacity:.8}100%{opacity:0}}

.screen{position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px}
button{padding:12px 16px;border:none;border-radius:12px;background:#ffcc00;font-weight:700}

.particle{position:fixed;width:6px;height:6px;border-radius:50%;background:#fff;animation:p 600ms forwards;pointer-events:none}
@keyframes p{to{transform:translate(var(--x),var(--y));opacity:0}}

</style>
</head>
<body>

<div id="bg"></div>

<div id="hud">
<div>⭐ <span id="score">0</span></div>
<div>🎯 Lvl <span id="level">1</span></div>
<div>🚶 <span id="moves">20</span></div>
</div>

<div id="wrap"><div class="board" id="board"></div></div>
<div id="flash"></div>

<div id="start" class="screen">
<h2>🌶️ Baharat Saga STORE</h2>
<p>🚀 Rocket | 💣 Bomb | 🌈 Color Bomb<br>Full physics + combo engine</p>
<button onclick="startGame()">BAŞLA</button>
</div>

<div id="win" class="screen" style="display:none">
<h2>🎁 Level Bitti!</h2>
<p>Sandık açılıyor...</p>
<button onclick="nextLevel()">DEVAM</button>
</div>

<div id="fail" class="screen" style="display:none">
<h2>❌ Kaybettin</h2>
<button onclick="location.reload()">TEKRAR</button>
</div>

<script>
const base=["zerdecal","safran","pulbiber","karabiber","kekik","tarcin","sumak","anason"];

let board=[],lock=false;
let score=0,level=1,moves=20,target=300;
let from=null,sx=0,sy=0;

function rand(){
let r=Math.random();
if(r<0.04)return"rocket";
if(r<0.07)return"bomb";
if(r<0.1)return"color";
return base[Math.floor(Math.random()*base.length)]
}

function startGame(){document.getElementById('start').style.display='none';init()}
function nextLevel(){document.getElementById('win').style.display='none';level++;moves=20+level*2;target+=200;init()}

function init(){
let b=document.getElementById('board');b.innerHTML='';board=[];
for(let i=0;i<36;i++){
let d=document.createElement('div');d.className='tile';board.push({type:rand(),el:d});

d.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;from=i});

d.addEventListener('touchend',e=>{
if(lock||moves<=0)return;
let dx=e.changedTouches[0].clientX-sx;
let dy=e.changedTouches[0].clientY-sy;
let to=Math.abs(dx)>Math.abs(dy)?(dx>0?from+1:from-1):(dy>0?from+6:from-6);
if(valid(from,to)) swapAndResolve(from,to);
});
b.appendChild(d);
}
draw();ui();}

function draw(){board.forEach(t=>t.el.innerHTML=`<img src='img/${t.type}.png'>`)}

function valid(a,b){if(b<0||b>=36)return false;let ar=Math.floor(a/6),br=Math.floor(b/6);return !(Math.abs(a-b)==1&&ar!=br)}

function swap(a,b){[board[a],board[b]]=[board[b],board[a]]}

function specialResolve(a,b){
let tA=board[a].type,tB=board[b].type;
let affected=[];

if(tA=="rocket"){
let r=Math.floor(a/6);
for(let i=0;i<6;i++)affected.push(r*6+i);
}
if(tB=="rocket"){
let r=Math.floor(b/6);
for(let i=0;i<6;i++)affected.push(r*6+i);
}

if(tA=="bomb"||tB=="bomb"){
let c=[a,b];
c.forEach(i=>{
let r=Math.floor(i/6),c=i%6;
for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
let nr=r+dr,nc=c+dc;if(nr>=0&&nc>=0&&nr<6&&nc<6)affected.push(nr*6+nc)
}
})
}

if(tA=="color"){
base.forEach(bt=>{
board.forEach((t,i)=>{if(t.type==tB)affected.push(i)})
})
}
if(tB=="color"){
board.forEach((t,i)=>{if(t.type==tA)affected.push(i)})
}

return [...new Set(affected)]
}

function swapAndResolve(a,b){lock=true;swap(a,b);draw();moves--;ui();
let spec=specialResolve(a,b);
let m=find();
let list=spec.length?spec:m;

if(!list.length){setTimeout(()=>{swap(a,b);draw();lock=false},150);return}
setTimeout(()=>resolve(list),100)}

function find(){let r=[];
for(let i=0;i<6;i++)for(let j=0;j<4;j++){let k=i*6+j,t=board[k].type;if(t==board[k+1].type&&t==board[k+2].type)r.push(k,k+1,k+2)}
for(let j=0;j<6;j++)for(let i=0;i<4;i++){let k=i*6+j,t=board[k].type;if(t==board[k+6].type&&t==board[k+12].type)r.push(k,k+6,k+12)}
return[...new Set(r)]}

async function resolve(list){
while(list.length){
list.forEach(i=>{
explode(board[i].el);score+=10;
board[i].type=null
});
ui();draw();await wait(80);gravity();fill();draw();await wait(80);list=find()}
check();lock=false}

function explode(el){flash();navigator.vibrate?.(20)}

function gravity(){for(let c=0;c<6;c++){let col=[];for(let r=5;r>=0;r--){let i=r*6+c;if(board[i].type)col.push(board[i].type)}for(let r=5;r>=0;r--){board[r*6+c].type=col.shift()||null}}}
function fill(){for(let i=0;i<36;i++)if(!board[i].type)board[i].type=rand()}

function check(){if(score>target){document.getElementById('win').style.display='flex'}if(moves<=0&&score<target){document.getElementById('fail').style.display='flex'}}

function ui(){scoreEl.innerText=score;levelEl.innerText=level;movesEl.innerText=moves}
function wait(ms){return new Promise(r=>setTimeout(r,ms))}

</script>
</body>
</html>
