<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baharat Saga STABLE FX</title>
<style>
*{box-sizing:border-box}
body{margin:0;overflow:hidden;background:#0b1020;font-family:sans-serif;color:#fff}

#hud{position:fixed;top:0;left:0;right:0;height:50px;display:flex;justify-content:space-between;align-items:center;padding:0 12px;background:#0008;z-index:10}

#wrap{position:absolute;top:50px;bottom:0;left:0;right:0;display:flex;justify-content:center;align-items:center}

.board{
width:min(100vw,100vh-50px);
height:min(100vw,100vh-50px);
display:grid;
grid-template-columns:repeat(6,1fr);
gap:4px;
padding:6px;
}

.tile{
background:#1e293b;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
transition:transform .12s;
}

.tile img{
width:100%;
height:100%;
object-fit:cover;
}

.pop{animation:pop .18s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}

.flash{
position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;
}
.flash.active{animation:flash .15s}
@keyframes flash{0%{opacity:.5}100%{opacity:0}}

.combo{
position:fixed;left:50%;top:45%;transform:translate(-50%,-50%);
font-size:26px;color:#ffd700;font-weight:bold;
animation:combo .6s forwards
}
@keyframes combo{0%{opacity:0}50%{opacity:1}100%{opacity:0;transform:translate(-50%,-80%)}}

.particle{
position:fixed;width:5px;height:5px;background:#fff;border-radius:50%;pointer-events:none;
animation:p .5s forwards
}
@keyframes p{to{transform:translate(var(--x),var(--y));opacity:0}}

</style>
</head>
<body>

<div id="hud">
<div>Score: <span id="score">0</span></div>
<div>Moves: <span id="moves">30</span></div>
</div>

<div id="wrap">
<div id="board" class="board"></div>
</div>

<div id="flash" class="flash"></div>

<script>
const TYPES=["zerdecal","safran","pulbiber","karabiber","kekik","tarcin","sumak","anason"];

let size=6;
let board=[];
let busy=false;
let score=0;
let moves=30;
let comboCount=0;

function rand(){return TYPES[Math.floor(Math.random()*TYPES.length)]}
function img(type){return `img/${type}.png`}

function init(){
const el=document.getElementById("board");
el.innerHTML="";
board=[];

for(let i=0;i<size*size;i++){
let d=document.createElement("div");
d.className="tile";
let obj={type:rand(),el:d};
board.push(obj);

let start=null;

d.addEventListener("touchstart",e=>{
start={x:e.touches[0].clientX,y:e.touches[0].clientY,i};
});

d.addEventListener("touchend",e=>{
if(busy||moves<=0||!start)return;
let dx=e.changedTouches[0].clientX-start.x;
let dy=e.changedTouches[0].clientY-start.y;
let target;

if(Math.abs(dx)>Math.abs(dy)){
target = dx>20 ? start.i+1 : dx<-20 ? start.i-1 : null;
}else{
target = dy>20 ? start.i+size : dy<-20 ? start.i-size : null;
}

if(target!==null && valid(start.i,target)){
swapTry(start.i,target);
}
});

el.appendChild(d);
}

draw();
cleanStart();
}

function draw(){
board.forEach(t=>{
t.el.innerHTML = `<img src="${img(t.type)}" onerror="this.src='img/zerdecal.png'">`;
});
}

function valid(a,b){
if(b<0||b>=size*size) return false;
let ar=Math.floor(a/size);
let br=Math.floor(b/size);
if(Math.abs(a-b)==1 && ar!==br) return false;
return true;
}

function swap(a,b){[board[a],board[b]]=[board[b],board[a]]}

function swapTry(a,b){
busy=true;
moves--;
updateHUD();

swap(a,b);
draw();

let m=findMatches();

if(!m.length){
setTimeout(()=>{
swap(a,b);
draw();
busy=false;
},120);
return;
}

setTimeout(()=>resolve(),120);
}

function findMatches(){
let res=[];

for(let r=0;r<size;r++){
for(let c=0;c<size-2;c++){
let i=r*size+c;
let t=board[i].type;
if(t===board[i+1].type && t===board[i+2].type){
res.push(i,i+1,i+2);
}
}
}

for(let c=0;c<size;c++){
for(let r=0;r<size-2;r++){
let i=r*size+c;
let t=board[i].type;
if(t===board[i+size].type && t===board[i+size*2].type){
res.push(i,i+size,i+size*2);
}
}
}

return [...new Set(res)];
}

async function resolve(){
let m=findMatches();
comboCount=0;

while(m.length){
comboCount++;
showCombo(comboCount);
flash();

m.forEach(i=>{
board[i].el.classList.add("pop");
spawnParticles(board[i].el);
board[i].type=null;
score+=10*comboCount;
});

updateHUD();
await wait(100);

fall();
fill();
draw();

await wait(100);

m=findMatches();
}

busy=false;
}

function spawnParticles(el){
let rect=el.getBoundingClientRect();
for(let i=0;i<6;i++){
let p=document.createElement("div");
p.className="particle";
document.body.appendChild(p);

p.style.left=rect.left+rect.width/2+"px";
p.style.top=rect.top+rect.height/2+"px";

let a=Math.random()*Math.PI*2;
let d=30+Math.random()*30;

p.style.setProperty("--x",Math.cos(a)*d+"px");
p.style.setProperty("--y",Math.sin(a)*d+"px");

setTimeout(()=>p.remove(),500);
}
}

function flash(){
let f=document.getElementById("flash");
f.classList.add("active");
setTimeout(()=>f.classList.remove("active"),120);
}

function showCombo(c){
if(c<2)return;
let d=document.createElement("div");
d.className="combo";
d.innerText="x"+c;
document.body.appendChild(d);
setTimeout(()=>d.remove(),600);
}

function fall(){
for(let c=0;c<size;c++){
let col=[];
for(let r=size-1;r>=0;r--){
let i=r*size+c;
if(board[i].type) col.push(board[i].type);
}
for(let r=size-1;r>=0;r--){
board[r*size+c].type = col.shift() || null;
}
}
}

function fill(){
for(let i=0;i<size*size;i++){
if(!board[i].type) board[i].type=rand();
}
}

function cleanStart(){
let m=findMatches();
while(m.length){
m.forEach(i=>board[i].type=rand());
m=findMatches();
}
draw();
}

function updateHUD(){
document.getElementById("score").innerText=score;
document.getElementById("moves").innerText=moves;
}

function wait(ms){return new Promise(r=>setTimeout(r,ms))}

init();
</script>

</body>
</html>
