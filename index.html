<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baharat Saga LEVEL SYSTEM</title>
<style>
*{box-sizing:border-box}
body{margin:0;overflow:hidden;background:#070b18;font-family:sans-serif;color:#fff}

#hud{position:fixed;top:0;left:0;right:0;height:52px;display:flex;justify-content:space-between;align-items:center;padding:0 10px;background:#0009;z-index:10}

#barWrap{position:absolute;top:52px;left:0;right:0;height:6px;background:#111}
#bar{height:100%;width:0%;background:linear-gradient(90deg,#ffd700,#ff6a00)}

#wrap{position:absolute;top:58px;bottom:0;left:0;right:0;display:flex;justify-content:center;align-items:center}

.board{width:min(100vw,100vh-58px);height:min(100vw,100vh-58px);display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:6px}

.tile{background:#1e293b;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:transform .18s}
.tile img{width:100%;height:100%;object-fit:cover}

.flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none}
.flash.active{animation:flash .15s}
@keyframes flash{0%{opacity:.7}100%{opacity:0}}

.combo{position:fixed;left:50%;top:45%;transform:translate(-50%,-50%);font-size:24px;color:#ffd700;animation:combo .6s forwards}
@keyframes combo{0%{opacity:0}50%{opacity:1}100%{opacity:0;transform:translate(-50%,-80%)}}

#chest{
position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#000b;z-index:100
}

.chestBox{
background:#1e293b;padding:20px;border-radius:16px;text-align:center
}

button{padding:10px 16px;border:none;border-radius:10px;background:#ffd700;font-weight:bold}

</style>
</head>
<body>

<div id="hud">
<div>🌶 Gram: <span id="score">0</span></div>
<div>⭐ Level: <span id="lvl">1</span></div>
</div>

<div id="barWrap"><div id="bar"></div></div>

<div id="wrap"><div id="board" class="board"></div></div>

<div id="chest">
<div class="chestBox">
<h2>🎁 Chest Açıldı!</h2>
<p>Level tamamlandı ödül kazandın</p>
<button onclick="nextLevel()">Devam Et</button>
</div>
</div>

<script>
const TYPES=["zerdecal","safran","pulbiber","karabiber","kekik","tarcin","sumak","anason"];

let size=6,board=[],busy=false;
let score=0,level=1;
let target=30;
let collected=0;
let start=null;

function rand(){return TYPES[Math.floor(Math.random()*TYPES.length)]}
function img(t){return `img/${t}.png`}

function init(){
const el=document.getElementById("board");el.innerHTML="";board=[];

for(let i=0;i<size*size;i++){
let d=document.createElement("div");d.className="tile";
board.push({type:rand(),el:d});

let start;

d.addEventListener("touchstart",e=>{
if(busy)return;
start={i,x:e.touches[0].clientX,y:e.touches[0].clientY};
});


d.addEventListener("touchend",e=>{
if(!start||busy)return;

let dx=e.changedTouches[0].clientX-start.x;
let dy=e.changedTouches[0].clientY-start.y;

let t=null;
if(Math.abs(dx)>Math.abs(dy)){
if(dx>30)t=start.i+1;else if(dx<-30)t=start.i-1;
}else{
if(dy>30)t=start.i+size;else if(dy<-30)t=start.i-size;
}

if(valid(start.i,t))swapTry(start.i,t);
start=null;
});

el.appendChild(d);
}

draw();clean();updateUI();}

function draw(){
board.forEach(t=>{
t.el.innerHTML=`<img src="${img(t.type)}" onerror="this.src='img/zerdecal.png'">`;
});
}

function valid(a,b){if(b<0||b>=size*size)return false;let ar=Math.floor(a/size),br=Math.floor(b/size);return !(Math.abs(a-b)==1&&ar!==br)}

function swap(a,b){[board[a],board[b]]=[board[b],board[a]]}

function swapTry(a,b){busy=true;swap(a,b);draw();

let m=find();
if(!m.length){
setTimeout(()=>{swap(a,b);draw();busy=false},120);
return;
}

setTimeout(()=>resolve(),120);
}

function resolve(){
let m=find();
if(!m.length){busy=false;return}

m.forEach(i=>{
board[i].type=null;
score+=1;
collected++;
});

updateUI();

setTimeout(()=>{
fall();fill();draw();checkLevel();resolve();
},120);
}

function find(){
let res=[];
for(let r=0;r<size;r++)for(let c=0;c<size-2;c++){
let i=r*size+c,t=board[i].type;
if(t&&t===board[i+1].type&&t===board[i+2].type)res.push(i,i+1,i+2)
}
for(let c=0;c<size;c++)for(let r=0;r<size-2;r++){
let i=r*size+c,t=board[i].type;
if(t&&t===board[i+size].type&&t===board[i+size*2].type)res.push(i,i+size,i+size*2)
}
return[...new Set(res)]}

function fall(){for(let c=0;c<size;c++){
let col=[];
for(let r=size-1;r>=0;r--){let i=r*size+c;if(board[i].type)col.push(board[i].type)}
for(let r=size-1;r>=0;r--){board[r*size+c].type=col.shift()||null}
}}

function fill(){for(let i=0;i<size*size;i++)if(!board[i].type)board[i].type=rand()}

function clean(){let m=find();while(m.length){m.forEach(i=>board[i].type=rand());m=find()}draw()}

function updateUI(){
document.getElementById("score").innerText=score;
document.getElementById("lvl").innerText=level;
let p=Math.min(100,(collected/target)*100);
document.getElementById("bar").style.width=p+"%";
}

function checkLevel(){
if(collected>=target){
document.getElementById("chest").style.display="flex";
busy=true;
}
}

function nextLevel(){
level++;
target=30+level*10;
collected=0;
busy=false;
document.getElementById("chest").style.display="none";
init();
}

init();
</script>

</body>
</html>
