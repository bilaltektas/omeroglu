<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baharat Saga AAA SWAP FX</title>
<style>
*{box-sizing:border-box}
body{margin:0;overflow:hidden;background:#0b1020;font-family:sans-serif;color:#fff}

#hud{position:fixed;top:0;left:0;right:0;height:50px;display:flex;justify-content:space-between;align-items:center;padding:0 12px;background:#0008;z-index:10}
#wrap{position:absolute;top:50px;bottom:0;left:0;right:0;display:flex;justify-content:center;align-items:center}

.board{width:min(100vw,100vh-50px);height:min(100vw,100vh-50px);display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:6px}

.tile{
background:#1e293b;border-radius:12px;
display:flex;align-items:center;justify-content:center;
overflow:hidden;
transition:transform .18s cubic-bezier(.2,.8,.2,1);
}

.tile img{width:100%;height:100%;object-fit:cover}

/* FX */
.flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none}
.flash.active{animation:flash .15s}
@keyframes flash{0%{opacity:.6}100%{opacity:0}}

.beam{position:fixed;height:6px;background:linear-gradient(90deg,#fff,#ff0,#fff);z-index:50;animation:beam .25s forwards}
@keyframes beam{from{transform:scaleX(0)}to{transform:scaleX(1);opacity:0}}

.shock{position:fixed;border:2px solid #fff;border-radius:50%;z-index:50;animation:shock .35s forwards}
@keyframes shock{from{transform:scale(.2);opacity:1}to{transform:scale(2.5);opacity:0}}

.particle{position:fixed;width:5px;height:5px;background:#fff;border-radius:50%;pointer-events:none;animation:p .4s forwards}
@keyframes p{to{transform:translate(var(--x),var(--y));opacity:0}}

.combo{position:fixed;left:50%;top:45%;transform:translate(-50%,-50%);font-size:26px;color:#ffd700;animation:combo .6s forwards}
@keyframes combo{0%{opacity:0}50%{opacity:1}100%{opacity:0;transform:translate(-50%,-80%)}}

</style>
</head>
<body>

<div id="hud">
<div>🌶️ Gram: <span id="score">0</span></div>
<div>♾️ Endless</div>
</div>

<div id="wrap"><div id="board" class="board"></div></div>
<div id="flash" class="flash"></div>

<script>
const TYPES=["zerdecal","safran","pulbiber","karabiber","kekik","tarcin","sumak","anason"];

let size=6,board=[],busy=false,score=0,combo=0;
let start=null;

function rand(){
let r=Math.random();
if(r<0.03)return "rocket";
if(r<0.06)return "bomb";
if(r<0.09)return "color";
return TYPES[Math.floor(Math.random()*TYPES.length)]
}

function img(t){return `img/${t}.png`}

function init(){
const el=document.getElementById("board");el.innerHTML="";board=[];

for(let i=0;i<size*size;i++){
let d=document.createElement("div");d.className="tile";
board.push({type:rand(),el:d,power:null});

let start;

d.addEventListener("touchstart",e=>{
if(busy)return;
start={i,x:e.touches[0].clientX,y:e.touches[0].clientY};
});

// drag preview

d.addEventListener("touchmove",e=>{
if(!start||busy)return;
let dx=e.touches[0].clientX-start.x;
let dy=e.touches[0].clientY-start.y;
board[start.i].el.style.transform=`translate(${dx}px,${dy}px)`;
});

// release

d.addEventListener("touchend",e=>{
if(!start||busy)return;

let dx=e.changedTouches[0].clientX-start.x;
let dy=e.changedTouches[0].clientY-start.y;

let target=null;
if(Math.abs(dx)>Math.abs(dy)){
if(dx>30) target=start.i+1;
else if(dx<-30) target=start.i-1;
}else{
if(dy>30) target=start.i+size;
else if(dy<-30) target=start.i-size;
}

board[start.i].el.style.transform="";

if(target!==null && valid(start.i,target)){
swapTry(start.i,target);
}

start=null;
});

el.appendChild(d);
}

draw();clean();}

function draw(){
board.forEach(t=>{
t.el.innerHTML=`<img src="${img(t.type)}" onerror="this.src='img/zerdecal.png'">`;
t.el.style.transform="";
});
}

function valid(a,b){if(b<0||b>=size*size)return false;let ar=Math.floor(a/size),br=Math.floor(b/size);return !(Math.abs(a-b)==1&&ar!==br)}

function swap(a,b){[board[a],board[b]]=[board[b],board[a]]}

function swapTry(a,b){busy=true;swap(a,b);draw();

let match=find();

if(!match.length){
setTimeout(()=>{
swap(a,b);
draw();busy=false;
},140);
return;
}

setTimeout(()=>resolve(a,b),140);
}

function resolve(a,b){
let list=find();
activatePower(a,b,list);
process(list);
}

function activatePower(a,b,list){
[a,b].forEach(i=>{
let t=board[i].type;

if(t=="rocket"){
beam(Math.floor(i/size));
for(let c=0;c<size;c++)list.push(Math.floor(i/size)*size+c);
}

if(t=="bomb"){
shock(board[i].el);
let r=Math.floor(i/size),c=i%size;
for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
let nr=r+dr,nc=c+dc;
if(nr>=0&&nc>=0&&nr<size&&nc<size)list.push(nr*size+nc);
}
}

if(t=="color"){
flash();
let target=board[a].type;
board.forEach((x,i)=>{if(x.type===target)list.push(i)});
}
});
}

function process(list){
list=[...new Set(list)];
combo++;
showCombo(combo);

list.forEach(i=>{
spawnParticles(board[i].el);
board[i].type=null;
score+=1*combo;
});

updateHUD();

setTimeout(()=>{
fall();fill();draw();busy=false;
},120);
}

function find(){
let res=[];
for(let r=0;r<size;r++)for(let c=0;c<size-2;c++){
let i=r*size+c,t=board[i].type;
if(t&&t===board[i+1].type&&t===board[i+2].type)res.push(i,i+1,i+2)
}
for(let c=0;c<size;c++)for(let r=0;r<size-2;r++){
let i=r*size+c,t=board[i].type;
if(t&&t===board[i+size].type&&t===board[i+size*2].type)res.push(i,i+size,i+size*2)
}
return[...new Set(res)]}

function beam(row){
let b=document.createElement("div");b.className="beam";
b.style.top=(row*(window.innerHeight/6)+60)+"px";
b.style.left="0";b.style.right="0";
document.body.appendChild(b);
setTimeout(()=>b.remove(),250);
}

function shock(el){
let r=el.getBoundingClientRect();
let s=document.createElement("div");s.className="shock";
s.style.left=r.left+"px";
s.style.top=r.top+"px";
s.style.width=r.width+"px";
s.style.height=r.height+"px";
document.body.appendChild(s);
setTimeout(()=>s.remove(),350);
}

function flash(){
let f=document.getElementById("flash");f.classList.add("active");setTimeout(()=>f.classList.remove("active"),120);
}

function spawnParticles(el){
let r=el.getBoundingClientRect();
for(let i=0;i<5;i++){
let p=document.createElement("div");p.className="particle";
p.style.left=r.left+r.width/2+"px";
p.style.top=r.top+r.height/2+"px";
let a=Math.random()*Math.PI*2;
let d=20+Math.random()*30;
p.style.setProperty("--x",Math.cos(a)*d+"px");
p.style.setProperty("--y",Math.sin(a)*d+"px");
document.body.appendChild(p);
setTimeout(()=>p.remove(),400);
}
}

function showCombo(c){if(c<2)return;let d=document.createElement("div");d.className="combo";d.innerText="x"+c;document.body.appendChild(d);setTimeout(()=>d.remove(),600)}

function fall(){for(let c=0;c<size;c++){let col=[];for(let r=size-1;r>=0;r--){let i=r*size+c;if(board[i].type)col.push(board[i])}
for(let r=size-1;r>=0;r--){let i=r*size+c;let v=col.shift();board[i]=v||{type:null,el:board[i].el}}}}

function fill(){for(let i=0;i<size*size;i++){if(!board[i].type)board[i].type=rand()}}

function clean(){let m=find();while(m.length){m.forEach(i=>board[i].type=rand());m=find()}draw()}

function updateHUD(){document.getElementById("score").innerText=score}

init();
</script>

</body>
</html>
